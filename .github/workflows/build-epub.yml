name: Build EPUB

# 允许手动点击按钮触发
on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出源码
        uses: actions/checkout@v4

      - name: 设置 Node.js v10 (完美避开 gitbook-cli 报错)
        uses: actions/setup-node@v4
        with:
          node-version: '10'

      - name: 安装 Calibre (GitBook 生成 EPUB 的必备底层依赖)
        run: |
          sudo apt-get update
          sudo apt-get install -y calibre

      - name: 安装 GitBook 环境
        run: npm install -g gitbook-cli

      - name: 安装插件并生成 EPUB
        run: |
          gitbook install
          gitbook epub ./ ./FlutterBook.epub

      - name: 提取生成的 EPUB 文件
        uses: actions/upload-artifact@v4
        with:
          name: FlutterBook-EPUB
          path: ./FlutterBook.epub
