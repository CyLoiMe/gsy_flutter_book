name: Build EPUB with mdBook

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出源码
        uses: actions/checkout@v4

      - name: 安装 mdBook
        uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: 'latest'

      - name: 安装 mdbook-epub 插件
        run: |
          wget https://github.com/HaoZeke/mdbook-epub/releases/download/v0.4.38/mdbook-epub-v0.4.38-x86_64-unknown-linux-musl.tar.gz
          tar -xzf mdbook-epub-v0.4.38-x86_64-unknown-linux-musl.tar.gz
          sudo mv mdbook-epub /usr/local/bin/

      - name: 生成配置文件
        run: |
          cat <<EOF > book.toml
          [book]
          authors = ["CarGuo"]
          language = "zh-cn"
          src = "."
          title = "Flutter 完整开发实战详解"
          [output.epub]
          EOF

      - name: 生成 EPUB (遇到死图会自动跳过不报错)
        run: mdbook build

      - name: 提取生成的 EPUB 文件
        uses: actions/upload-artifact@v4
        with:
          name: FlutterBook-mdBook-EPUB
          path: book/epub/Flutter 完整开发实战详解.epub
