name: Build EPUB (Smart Fetch & Clean)

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出源码
        uses: actions/checkout@v4

      - name: 设置 Node.js v10 & Python 环境
        uses: actions/setup-node@v4
        with:
          node-version: '10'

      - name: 安装基础依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y calibre
          npm install -g gitbook-cli
          npm install -g svgexport
          pip3 install requests

      - name: 🚀 智能清理与预下载 (剔除作者本地死链 + 自动下载网络图)
        run: |
          cat << 'EOF' > pre_download.py
          import os, re, requests, uuid

          for root, dirs, files in os.walk('.'):
              if 'node_modules' in root or '.git' in root: continue
              for file in files:
                  if file.endswith('.md'):
                      filepath = os.path.join(root, file)
                      with open(filepath, 'r', encoding='utf-8') as f:
                          content = f.read()

                      # 1. 剔除作者误填的 Windows 本地 C 盘/D 盘绝对路径
                      def replacer_win_md(match):
                          path = match.group(2)
                          print(f"Removed local absolute path: {path}")
                          return f"> *[作者本地图片缺失: {path}]*"
                      # 匹配 c:/, C:\ 等绝对路径
                      content = re.sub(r'!\[([^\]]*)\]\(([a-zA-Z]:[\\/][^\)]+)\)', replacer_win_md, content)

                      # 2. 预下载正常的网络图片
                      def download_img(url):
                          try:
                              headers = {'User-Agent': 'Mozilla/5.0'}
                              r = requests.get(url, timeout=10, headers=headers)
                              if r.status_code == 200:
                                  ext = 'png'
                                  if '.svg' in url.lower(): ext = 'svg'
                                  elif '.jpg' in url.lower() or '.jpeg' in url.lower(): ext = 'jpg'
                                  elif '.gif' in url.lower(): ext = 'gif'
                                  filename = f"img_{uuid.uuid4().hex[:8]}.{ext}"
                                  save_path = os.path.join(os.path.dirname(filepath), filename)
                                  with open(save_path, 'wb') as img_f:
                                      img_f.write(r.content)
                                  return filename
                          except Exception:
                              pass
                          return None

                      def replacer_md(match):
                          alt, url = match.group(1), match.group(2)
                          local_file = download_img(url)
                          if local_file: return f"![{alt}]({local_file})"
                          print(f"Skipped (Timeout/Error): {url}")
                          return f"> *[网络图片失效跳过: {url}]*"

                      content = re.sub(r'!\[([^\]]*)\]\((https?://[^\)]+)\)', replacer_md, content)

                      with open(filepath, 'w', encoding='utf-8') as f:
                          f.write(content)
          EOF
          python3 pre_download.py

      - name: 安装插件并生成 EPUB
        run: |
          gitbook install
          gitbook epub ./ ./FlutterBook.epub

      - name: 提取生成的 EPUB 文件
        uses: actions/upload-artifact@v4
        with:
          name: FlutterBook-EPUB
          path: ./FlutterBook.epub
