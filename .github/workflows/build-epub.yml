name: Build EPUB (All Caches & Bulletproof)

on:
  workflow_dispatch: 
    inputs:
      target_device:
        description: '选择目标阅读设备'
        required: true
        default: 'boox_p6'
        type: choice
        options:
          - boox_p6    # 文石 P6 (极小体积，黑白灰度)
          - phone_2k   # 2K 手机 (适中体积，保留色彩)
          - original   # 电脑端 (保留 1.5GB 原图)
  schedule:
    # 自动保活：每 5 天运行一次，唤醒所有缓存，重置寿命
    - cron: '0 0 */5 * *'

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      TARGET_DEVICE: ${{ github.event.inputs.target_device || 'original' }}
    
    steps:
      - name: 检出源码
        uses: actions/checkout@v4

      # ==================== 极速保活区 (仅定时任务触发) ====================
      - name: 📦 [保活] 唤醒 Boox P6 成品缓存
        if: github.event_name == 'schedule'
        uses: actions/cache/restore@v4
        with:
          path: dummy_boox/
          key: ${{ runner.os }}-images-boox_p6-${{ hashFiles('**/*.md') }}

      - name: 📦 [保活] 唤醒 2K 手机 成品缓存
        if: github.event_name == 'schedule'
        uses: actions/cache/restore@v4
        with:
          path: dummy_phone/
          key: ${{ runner.os }}-images-phone_2k-${{ hashFiles('**/*.md') }}

      # ==================== 核心图库读取 (通用) ====================
      - name: 📦 1. 恢复原图底包缓存 (读取你 1.5GB 的原始老库)
        uses: actions/cache@v4
        with:
          path: |
            local_images/
            image_cache.json
          key: ${{ runner.os }}-gitbook-images-${{ hashFiles('**/*.md') }}
          restore-keys: |
            ${{ runner.os }}-gitbook-images-

      - name: 🛑 定时保活任务完成，提前下班
        if: github.event_name == 'schedule'
        run: |
          echo "🎉 所有缓存均已成功唤醒，寿命重置为 7 天！"
          echo "跳过生成 EPUB，直接收工。"

      # ==================== 环境与构建 (仅手动触发执行) ====================
      - name: 设置 Node.js v10 & Python 环境
        if: github.event_name != 'schedule'
        uses: actions/setup-node@v4
        with:
          node-version: '10'

      - name: 安装基础依赖
        if: github.event_name != 'schedule'
        run: |
          sudo apt-get update
          sudo apt-get install -y calibre imagemagick
          npm install -g gitbook-cli
          npm install -g svgexport
          pip3 install requests

      - name: 📦 2. 恢复当前选定设备的成品缓存
        if: github.event_name != 'schedule' && env.TARGET_DEVICE != 'original'
        uses: actions/cache@v4
        with:
          path: processed_images/
          key: ${{ runner.os }}-images-${{ env.TARGET_DEVICE }}-${{ hashFiles('**/*.md') }}

      - name: 🚀 智能路径分配与预下载
        if: github.event_name != 'schedule'
        run: |
          cat << 'EOF' > pre_download.py
          import os, re, requests, uuid, json

          CACHE_FILE = 'image_cache.json'
          ORIGINAL_DIR = 'local_images'
          target_device = os.environ.get('TARGET_DEVICE', 'original')
          USED_DIR = 'processed_images' if target_device != 'original' else ORIGINAL_DIR

          os.makedirs(ORIGINAL_DIR, exist_ok=True)
          if target_device != 'original':
              os.makedirs(USED_DIR, exist_ok=True)

          url_cache = {}
          if os.path.exists(CACHE_FILE):
              with open(CACHE_FILE, 'r', encoding='utf-8') as f:
                  url_cache = json.load(f)

          for root, dirs, files in os.walk('.'):
              if 'node_modules' in root or '.git' in root or ORIGINAL_DIR in root or USED_DIR in root: continue
              for file in files:
                  if file.endswith('.md'):
                      filepath = os.path.join(root, file)
                      with open(filepath, 'r', encoding='utf-8') as f:
                          content = f.read()

                      def replacer_win_md(match):
                          return f"> *[作者本地图片缺失: {match.group(2)}]*"
                      content = re.sub(r'!\[([^\]]*)\]\(([a-zA-Z]:[\\/][^\)]+)\)', replacer_win_md, content)

                      def download_img(url):
                          filename = url_cache.get(url)
                          if not filename:
                              try:
                                  headers = {'User-Agent': 'Mozilla/5.0'}
                                  r = requests.get(url, timeout=15, headers=headers)
                                  if r.status_code == 200:
                                      ext = 'png'
                                      if '.svg' in url.lower(): ext = 'svg'
                                      elif '.jpg' in url.lower() or '.jpeg' in url.lower(): ext = 'jpg'
                                      elif '.gif' in url.lower(): ext = 'gif'
                                      filename = f"img_{uuid.uuid4().hex[:8]}.{ext}"
                                      save_path = os.path.join(ORIGINAL_DIR, filename)
                                      with open(save_path, 'wb') as img_f:
                                          img_f.write(r.content)
                                      url_cache[url] = filename
                              except Exception:
                                  pass
                          
                          if filename:
                              save_path = os.path.join(USED_DIR, filename)
                              rel_path = os.path.relpath(save_path, start=os.path.dirname(filepath))
                              return rel_path.replace('\\', '/')
                          return None

                      def replacer_md(match):
                          alt, url = match.group(1), match.group(2)
                          local_file = download_img(url)
                          if local_file: return f"![{alt}]({local_file})"
                          return f"> *[网络图片失效跳过: {url}]*"

                      content = re.sub(r'!\[([^\]]*)\]\((https?://[^\)]+)\)', replacer_md, content)

                      with open(filepath, 'w', encoding='utf-8') as f:
                          f.write(content)

          with open(CACHE_FILE, 'w', encoding='utf-8') as f:
              json.dump(url_cache, f, ensure_ascii=False, indent=2)
          EOF
          python3 pre_download.py

      - name: 🗜️ 检查成品库状态并执行并发转换 (防内存溢出 & 容错跳过)
        if: github.event_name != 'schedule'
        run: |
          DEVICE="$TARGET_DEVICE"
          
          # 解除 ImageMagick 的系统默认内存封印
          export MAGICK_MEMORY_LIMIT=4000MB
          export MAGICK_MAP_LIMIT=4000MB
          export MAGICK_AREA_LIMIT=4000MB
          export MAGICK_DISK_LIMIT=8000MB
          
          if [ "$DEVICE" != "original" ]; then
            if [ -z "$(ls -A processed_images/ 2>/dev/null)" ]; then
              echo "🚧 没有命中 $DEVICE 的成品缓存，正在从 1.5GB 原图库复制并处理..."
              cp -a local_images/. processed_images/
              
              # 核心修改：使用 sh -c '... || true' 容错！哪怕某张变态长图压爆了，也只提示一句警告，绝对不中断整个任务！
              if [ "$DEVICE" = "boox_p6" ]; then
                echo "启动多线程并发压缩 (Boox P6)..."
                find processed_images/ -type f \( -iname \*.jpg -o -iname \*.jpeg -o -iname \*.png \) -print0 | xargs -0 -n 1 -P 4 -I {} sh -c "mogrify -resize '824x>' -colorspace Gray -quality 70 '{}' || echo '⚠️ 跳过超大异常图片: {}'"
              elif [ "$DEVICE" = "phone_2k" ]; then
                echo "启动多线程并发压缩 (2K 手机)..."
                find processed_images/ -type f \( -iname \*.jpg -o -iname \*.jpeg -o -iname \*.png \) -print0 | xargs -0 -n 1 -P 4 -I {} sh -c "mogrify -resize '1440x>' -quality 80 '{}' || echo '⚠️ 跳过超大异常图片: {}'"
              fi
            else
              echo "🎉 完美命中 $DEVICE 专属成品缓存！跳过耗时的图片压缩，直接起飞！"
            fi
          else
            echo "选择原图模式，跳过压缩步骤。"
          fi

      - name: 安装插件并生成 EPUB
        if: github.event_name != 'schedule'
        run: |
          gitbook install
          gitbook epub ./ ./FlutterBook.epub

      - name: 提取生成的 EPUB 文件
        if: github.event_name != 'schedule'
        uses: actions/upload-artifact@v4
        with:
          name: FlutterBook-EPUB-${{ env.TARGET_DEVICE }}
          path: ./FlutterBook.epub
