name: Build EPUB (Multi-Device)

on:
  workflow_dispatch: 
    inputs:
      target_device:
        description: '选择目标阅读设备 (决定图片压缩策略)'
        required: true
        default: 'boox_p6'
        type: choice
        options:
          - boox_p6    # 文石 P6 (黑白墨水屏，极限压缩体积)
          - phone_2k   # 2K 手机/平板 (彩色高清，适度压缩)
          - original   # 电脑端 (保留 1.5GB 巨无霸原图)

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出源码
        uses: actions/checkout@v4

      - name: 设置 Node.js v10 & Python 环境
        uses: actions/setup-node@v4
        with:
          node-version: '10'

      - name: 安装基础依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y calibre imagemagick
          npm install -g gitbook-cli
          npm install -g svgexport
          pip3 install requests

      - name: 📦 读取原有的 1.5GB 高清图片缓存 (秒读，不再下载！)
        uses: actions/cache@v4
        with:
          path: |
            local_images/
            image_cache.json
          # 撤销了之前的 -compressed 后缀，精准命中你那 1.5GB 的原版缓存
          key: ${{ runner.os }}-gitbook-images-${{ hashFiles('**/*.md') }}
          restore-keys: |
            ${{ runner.os }}-gitbook-images-

      - name: 🚀 智能清理与路径替换
        run: |
          cat << 'EOF' > pre_download.py
          import os, re, requests, uuid, json

          CACHE_FILE = 'image_cache.json'
          IMG_DIR = 'local_images'
          os.makedirs(IMG_DIR, exist_ok=True)

          url_cache = {}
          if os.path.exists(CACHE_FILE):
              with open(CACHE_FILE, 'r', encoding='utf-8') as f:
                  url_cache = json.load(f)

          for root, dirs, files in os.walk('.'):
              if 'node_modules' in root or '.git' in root or IMG_DIR in root: continue
              for file in files:
                  if file.endswith('.md'):
                      filepath = os.path.join(root, file)
                      with open(filepath, 'r', encoding='utf-8') as f:
                          content = f.read()

                      def replacer_win_md(match):
                          return f"> *[作者本地图片缺失: {match.group(2)}]*"
                      content = re.sub(r'!\[([^\]]*)\]\(([a-zA-Z]:[\\/][^\)]+)\)', replacer_win_md, content)

                      def download_img(url):
                          filename = url_cache.get(url)
                          if not filename:
                              try:
                                  headers = {'User-Agent': 'Mozilla/5.0'}
                                  r = requests.get(url, timeout=15, headers=headers)
                                  if r.status_code == 200:
                                      ext = 'png'
                                      if '.svg' in url.lower(): ext = 'svg'
                                      elif '.jpg' in url.lower() or '.jpeg' in url.lower(): ext = 'jpg'
                                      elif '.gif' in url.lower(): ext = 'gif'
                                      filename = f"img_{uuid.uuid4().hex[:8]}.{ext}"
                                      save_path = os.path.join(IMG_DIR, filename)
                                      with open(save_path, 'wb') as img_f:
                                          img_f.write(r.content)
                                      url_cache[url] = filename
                              except Exception:
                                  pass
                          
                          if filename:
                              save_path = os.path.join(IMG_DIR, filename)
                              if os.path.exists(save_path):
                                  rel_path = os.path.relpath(save_path, start=os.path.dirname(filepath))
                                  return rel_path.replace('\\', '/')
                          return None

                      def replacer_md(match):
                          alt, url = match.group(1), match.group(2)
                          local_file = download_img(url)
                          if local_file: return f"![{alt}]({local_file})"
                          return f"> *[网络图片失效跳过: {url}]*"

                      content = re.sub(r'!\[([^\]]*)\]\((https?://[^\)]+)\)', replacer_md, content)

                      with open(filepath, 'w', encoding='utf-8') as f:
                          f.write(content)

          with open(CACHE_FILE, 'w', encoding='utf-8') as f:
              json.dump(url_cache, f, ensure_ascii=False, indent=2)
          EOF
          python3 pre_download.py

      - name: 🗜️ 动态处理图片 (基于你的选择)
        run: |
          DEVICE="${{ github.event.inputs.target_device }}"
          
          if [ "$DEVICE" = "boox_p6" ]; then
            echo "正在针对 Boox P6 优化: 缩放到 824 像素宽、转为灰度、压缩画质..."
            find local_images/ -type f \( -iname \*.jpg -o -iname \*.jpeg -o -iname \*.png \) -exec mogrify -resize '824x>' -colorspace Gray -quality 70 {} +
          elif [ "$DEVICE" = "phone_2k" ]; then
            echo "正在针对 2K 手机优化: 缩放到 1440 像素宽、保留彩色、适度压缩画质..."
            find local_images/ -type f \( -iname \*.jpg -o -iname \*.jpeg -o -iname \*.png \) -exec mogrify -resize '1440x>' -quality 80 {} +
          else
            echo "选择了保留原图，跳过压缩。"
          fi

      - name: 安装插件并生成 EPUB
        run: |
          gitbook install
          gitbook epub ./ ./FlutterBook.epub

      - name: 提取生成的 EPUB 文件
        uses: actions/upload-artifact@v4
        with:
          name: FlutterBook-EPUB-${{ github.event.inputs.target_device }}
          path: ./FlutterBook.epub
